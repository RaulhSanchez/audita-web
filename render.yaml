services:
  - type: web
    name: audita-web-api
    env: node
    plan: free
    region: frankfurt
    buildCommand: npm install -g pnpm@9 && NODE_ENV=development pnpm install --no-frozen-lockfile && pnpm --filter api build
    startCommand: cd apps/api && node --max-old-space-size=450 dist/src/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # se pone a mano en Render dashboard
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        value: ""
      - key: TELEGRAM_CHAT_ID
        value: ""
      - key: FRONTEND_BASE_URL
        sync: false          # URL del frontend en GitHub Pages
      - key: REPORTS_DIR
        value: /tmp/reports  # disco efímero — el PDF se envía por email antes de reiniciar
      - key: OLLAMA_BASE_URL
        value: ""            # no disponible en la nube — narrativa usa fallback automático
      - key: OLLAMA_MODEL
        value: llama3.2
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"           # no Chromium on Render — Lighthouse & PDF use fallback paths
