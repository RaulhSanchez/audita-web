# ──────────────────────────────────────────────────────────────────────────────
# Cortexa AI · nginx.conf (post-auditoría)
#
# Cambios respecto a la versión original:
#   - Cabeceras de seguridad (HSTS, CSP, X-Frame-Options, X-Content-Type-Options,
#     Referrer-Policy, Permissions-Policy).
#   - Rate limit por IP en endpoints sensibles.
#   - Timeouts razonables (300s para LLM streaming en lugar de 86400s).
#   - Endpoint /healthz para healthchecks.
#   - TLS modernizado (solo TLSv1.2 + TLSv1.3, ciphers fuertes).
#   - HTTP -> HTTPS con HSTS.
#
# IMPORTANTE: el certificado autofirmado SOLO se admite en pruebas. Para
# producción sustituye selfsigned.crt/.key por uno emitido por una CA
# reconocida (Let's Encrypt o la CA corporativa).
# ──────────────────────────────────────────────────────────────────────────────
events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logs ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    server_tokens   off;          # No filtrar versión de Nginx

    keepalive_timeout 65;
    client_body_timeout 30;
    client_header_timeout 10;
    send_timeout 30;

    # ── Rate limiting ───────────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api:10m  rate=10r/s;
    limit_req_zone  $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=concurrent:10m;

    # ── Compresión ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml
               application/xml application/xml+rss text/javascript image/svg+xml;

    # ── HTTP -> HTTPS ───────────────────────────────────────────────────────
    server {
        listen 80;
        server_name cortexa.local;
        # Permite Let's Encrypt HTTP-01 challenge si lo configuras
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }

    # ── HTTPS ───────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name cortexa.local;

        ssl_certificate     /etc/nginx/certs/selfsigned.crt;
        ssl_certificate_key /etc/nginx/certs/selfsigned.key;

        # TLS moderno
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # ── Cabeceras de seguridad ─────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # CSP: empezamos permisivo (Streamlit injecta CSS/JS inline) y endurecemos.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' wss: ws:; frame-ancestors 'self';" always;

        # Tamaño máximo del cuerpo (subidas) — alineado con MAX_FILE_SIZE_MB
        client_max_body_size 50M;

        # Conexiones concurrentes por IP
        limit_conn concurrent 20;

        # Healthcheck local del proxy (sin auth, sin rate limit)
        location = /healthz {
            access_log off;
            add_header Content-Type "text/plain";
            return 200 "ok\n";
        }

        # ── API REST ────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://app:8501;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_read_timeout 300s;       # streaming LLM hasta 5 min
            proxy_send_timeout 300s;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # ── App Streamlit ───────────────────────────────────────────────────
        location / {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://app:8501;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSockets (Streamlit)
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts razonables (NO 86400 — eso permite DoS por conexión colgada)
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_buffering off;
        }
    }
}
