services:
  - type: web
    name: audita-web-api
    env: node
    plan: free
    region: frankfurt
    buildCommand: npm install -g pnpm@9 && pnpm install --frozen-lockfile && pnpm --filter api build && cd apps/api && npx prisma generate
    startCommand: cd apps/api && npx prisma db push && node dist/src/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # se pone a mano en Render dashboard
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        value: ""
      - key: TELEGRAM_CHAT_ID
        value: ""
      - key: NEXT_PUBLIC_BASE_URL
        sync: false          # URL del frontend en GitHub Pages
      - key: REPORTS_DIR
        value: /tmp/reports  # disco efímero — el PDF se envía por email antes de reiniciar
      - key: OLLAMA_BASE_URL
        value: ""            # no disponible en la nube — narrativa usa fallback automático
